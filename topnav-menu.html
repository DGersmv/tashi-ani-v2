<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASHI-ANI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080d08;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  /* ── TOP NAV ── */
  .topnav {
    width: 100%;
    height: 72px;
    flex-shrink: 0;
    background: #060b06;
    border-bottom: 1px solid rgba(122,158,114,0.15);
    display: flex;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  /* Logo canvas zone — left side */
  .logo-zone {
    position: relative;
    width: 280px;
    height: 72px;
    flex-shrink: 0;
    border-right: 1px solid rgba(122,158,114,0.12);
    overflow: hidden;
  }

  #logoCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Nav links */
  nav {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 16px;
    flex: 1;
  }

  nav a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 24px;
    height: 72px;
    color: rgba(201,169,110,0.45);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
    position: relative;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: #C9A96E;
    transition: width 0.35s;
  }

  nav a:hover {
    color: rgba(201,169,110,1);
    background: rgba(201,169,110,0.03);
  }

  nav a:hover::after { width: 60%; }

  nav a .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(122,158,114,0.35);
    transition: background 0.3s;
  }
  nav a:hover .dot { background: #C9A96E; }

  /* Right side status */
  .nav-right {
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(122,158,114,0.25);
    text-transform: uppercase;
    border-left: 1px solid rgba(122,158,114,0.08);
    height: 72px;
  }

  .pulse {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #3A5236;
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; background: #7A9E72; }
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(201,169,110,0.1);
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header class="topnav">
  <div class="logo-zone">
    <canvas id="logoCanvas"></canvas>
  </div>

  <nav>
    <a href="#"><span class="dot"></span>Главная</a>
    <a href="#"><span class="dot"></span>Проекты</a>
    <a href="#"><span class="dot"></span>Услуги</a>
    <a href="#"><span class="dot"></span>Галерея</a>
    <a href="#"><span class="dot"></span>О нас</a>
    <a href="#"><span class="dot"></span>Контакты</a>
  </nav>

  <div class="nav-right">
    <div class="pulse"></div>
    2024
  </div>
</header>

<main class="main">
  ↑ выберите раздел
</main>

<script>
const canvas = document.getElementById('logoCanvas');
const ctx    = canvas.getContext('2d');

let W, H, dpr;
let textPixels = [];
let particles  = [];
let phase = 0, phaseTimer = 0;
const PHASE_FORM     = 280;
const PHASE_HOLD     = 300;
const PHASE_DISPERSE = 320;

function resize() {
  const zone = canvas.parentElement;
  dpr = window.devicePixelRatio || 1;
  W = zone.clientWidth;
  H = zone.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  sampleText();
  initParticles();
}

function sampleText() {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const oc = off.getContext('2d');
  // Fit text to width with padding
  let fontSize = H * 0.55;
  oc.font = `normal ${fontSize}px 'ChinaCyr', serif`;
  const padding = W * 0.16;
  const maxW = W - padding * 2;
  let measured = oc.measureText('TASHI-ANI').width;
  if (measured > maxW) fontSize *= maxW / measured;
  fontSize = Math.min(fontSize, H * 0.55);
  oc.font = `normal ${fontSize}px 'ChinaCyr', serif`;
  oc.fillStyle = '#fff';
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillText('TASHI-ANI', W / 2, H / 2);
  const data = oc.getImageData(0, 0, W, H).data;
  textPixels = [];
  const step = Math.max(2, Math.floor(W / 150));
  for (let y = 0; y < H; y += step)
    for (let x = 0; x < W; x += step)
      if (data[(y * W + x) * 4 + 3] > 128)
        textPixels.push({ x, y });
}

// Spawn from TOP and LEFT edges only
function spawnPoint() {
  return Math.random() < 0.5
    ? { x: Math.random() * W, y: -12 }   // top
    : { x: -12, y: Math.random() * H };  // left
}

// Disperse to BOTTOM and RIGHT edges only
function edgePoint() {
  return Math.random() < 0.5
    ? { x: Math.random() * W, y: H + 12 }  // bottom
    : { x: W + 12, y: Math.random() * H }; // right
}

function initParticles() {
  const count = Math.min(textPixels.length, 1800);
  particles = [];
  for (let i = 0; i < count; i++) {
    const target = textPixels[Math.floor(Math.random() * textPixels.length)];
    const start  = spawnPoint();
    particles.push({
      x: start.x, y: start.y,
      tx: target.x, ty: target.y,
      ox: start.x,  oy: start.y,
      size: Math.random() * 1.3 + 0.5,
      brightness: Math.random() * 0.5 + 0.55,
      delay: Math.random() * 45,
      greenMix: Math.random(),
      dispX: 0, dispY: 0,
      ox2: 0,   oy2: 0
    });
  }
  // ambient
  for (let i = 0; i < 80; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = Math.random() * 0.08 + 0.02;
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      size: Math.random() * 0.8 + 0.2,
      brightness: Math.random() * 0.18 + 0.04,
      ambient: true
    });
  }
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
}
function lerp(a, b, t) { return a + (b - a) * t; }

let frame = 0;
function update() {
  phaseTimer++;
  if (phase === 0 && phaseTimer >= PHASE_FORM) {
    phase = 1; phaseTimer = 0;
  } else if (phase === 1 && phaseTimer >= PHASE_HOLD) {
    phase = 2; phaseTimer = 0;
    for (const p of particles) {
      if (!p.ambient) {
        const ep = edgePoint();
        p.dispX = ep.x; p.dispY = ep.y;
        p.ox2 = p.x;    p.oy2 = p.y;
      }
    }
  } else if (phase === 2 && phaseTimer >= PHASE_DISPERSE) {
    phase = 0; phaseTimer = 0;
    for (const p of particles) {
      if (!p.ambient) {
        const s = spawnPoint();
        const t = textPixels[Math.floor(Math.random() * textPixels.length)];
        p.x = s.x; p.y = s.y;
        p.ox = s.x; p.oy = s.y;
        p.tx = t.x; p.ty = t.y;
        p.delay = Math.random() * 80;
      }
    }
  }
}

function draw() {
  frame++;
  update();

  // match page background exactly
  ctx.fillStyle = '#060b06';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    if (p.ambient) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -5) p.x = W + 5;
      if (p.x > W+5) p.x = -5;
      if (p.y < -5) p.y = H + 5;
      if (p.y > H+5) p.y = -5;
      const al = p.brightness * (0.5 + 0.5 * Math.sin(frame * 0.025 + p.x));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(58,82,54,${al})`;
      ctx.fill();
      continue;
    }

    let px, py, colorProgress = 0, particleOpacity = 1;

    if (phase === 0) {
      const prog = Math.max(0, (phaseTimer - p.delay) / (PHASE_FORM - p.delay));
      const t = Math.min(1, prog);
      px = lerp(p.ox, p.tx, easeInOutCubic(t));
      py = lerp(p.oy, p.ty, easeInOutCubic(t));
      p.x = px; p.y = py;
      particleOpacity = t;
      colorProgress = 0;
    } else if (phase === 1) {
      px = p.tx + Math.sin(frame * 0.015 + p.tx * 0.01) * 0.5;
      py = p.ty + Math.cos(frame * 0.015 + p.ty * 0.01) * 0.5;
      p.x = px; p.y = py;
      colorProgress  = Math.min(1, phaseTimer / 50);
      particleOpacity = Math.max(0, 1 - phaseTimer / 50);
    } else {
      // fly to bottom/right AND fade out during flight
      const t = Math.min(1, phaseTimer / PHASE_DISPERSE);
      const e = easeInOutCubic(t);
      px = lerp(p.ox2, p.dispX, e);
      py = lerp(p.oy2, p.dispY, e);
      p.x = px; p.y = py;
      colorProgress   = 0;
      // fade out: gone by 65% of journey
      particleOpacity = Math.max(0, 1 - t / 0.65);
    }

    if (particleOpacity <= 0.015) continue;

    const gm = p.greenMix;
    const gr = lerp(58,  122, gm);
    const gg = lerp(82,  158, gm);
    const gb = lerp(54,  114, gm);
    const r  = Math.round(lerp(gr, 201, colorProgress));
    const g  = Math.round(lerp(gg, 169, colorProgress));
    const b  = Math.round(lerp(gb, 110, colorProgress));

    const bright = p.brightness * particleOpacity;
    const gr2    = ctx.createRadialGradient(px, py, 0, px, py, p.size * 3);
    gr2.addColorStop(0,   `rgba(${r},${g},${b},${bright})`);
    gr2.addColorStop(0.4, `rgba(${r},${g},${b},${bright*0.3})`);
    gr2.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(px, py, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = gr2;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, p.size * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.min(255,r+60)},${Math.min(255,g+50)},${Math.min(255,b+30)},${bright})`;
    ctx.fill();
  }

  // solid text phase 1→2
  if (phase === 1 || phase === 2) {
    const fadeIn  = phase === 1 ? Math.min(1, phaseTimer / 80) : 1;
    const fadeOut = phase === 2 ? Math.max(0, 1 - phaseTimer / 90) : 1;
    const alpha   = fadeIn * fadeOut;
    if (alpha > 0.01) {
      let fontSize = H * 0.55;
      ctx.font = `normal ${fontSize}px 'ChinaCyr', serif`;
      const padding = W * 0.16;
      const maxW = W - padding * 2;
      const measured = ctx.measureText('TASHI-ANI').width;
      if (measured > maxW) fontSize *= maxW / measured;
      fontSize = Math.min(fontSize, H * 0.55);
      ctx.save();
      ctx.font = `normal ${fontSize}px 'ChinaCyr', serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const grad = ctx.createLinearGradient(0, H/2 - fontSize*0.5, 0, H/2 + fontSize*0.5);
      grad.addColorStop(0,   `rgba(230,200,140,${alpha})`);
      grad.addColorStop(0.4, `rgba(201,169,110,${alpha})`);
      grad.addColorStop(1,   `rgba(180,140,80,${alpha})`);
      ctx.shadowColor = `rgba(201,169,110,${0.55 * alpha})`;
      ctx.shadowBlur  = 18;
      ctx.fillStyle   = grad;
      ctx.fillText('TASHI-ANI', W / 2, H / 2);
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}
